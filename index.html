<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSave | Online Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-400">CloudSave</h1>
        <input id="urlInput" type="text" placeholder="Paste link here..." 
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-4 outline-none focus:border-blue-500 transition-all text-white">
        <button onclick="downloadVideo()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
            Download to Local Storage
        </button>
        <p id="status" class="mt-4 text-center text-xs text-slate-500 hidden italic">Connecting to cloud engine...</p>
    </div>
    <script>
        const BACKEND_URL = "https://your-app-name.onrender.com";
        function downloadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            if (!url) return alert("Please paste a URL");
            status.classList.remove('hidden');
            btn.disabled = true;
            btn.style.opacity = "0.5";
            window.location.href = `${BACKEND_URL}/api/download?url=${encodeURIComponent(url)}`;
            setTimeout(() => {
                status.classList.add('hidden');
                btn.disabled = false;
                btn.style.opacity = "1";
            }, 10000);
        }
    </script>
</body>
</html>
